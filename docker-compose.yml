services:
  setup-server:
    image: nginx:1.30.0-alpine
    container_name: setup-server
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "8085:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - proxy-network

  setup-server-dev:
    image: nginx:1.30.0-alpine
    container_name: setup-server-dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8086:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
